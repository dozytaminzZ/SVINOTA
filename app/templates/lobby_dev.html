<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lobby Dev Form</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    form { border: 1px solid #ccc; padding: 12px; border-radius: 6px; }
    label { display: block; font-size: 12px; margin-top: 8px; }
    input { width: 100%; padding: 6px; margin-top: 4px; }
    button { margin-top: 10px; }
    code { background: #f5f5f5; padding: 2px 4px; }
  </style>
</head>
<body>
  <h1>Lobby Dev Form</h1>
  <p>These forms use your session cookie. Login via <code>/auth/dev</code> first.</p>

  <div class="grid">
    <form method="get" action="/lobby/rooms">
      <h3>List Rooms</h3>
      <label>Public only</label>
      <input name="public_only" value="1">
      <button type="submit">List</button>
    </form>

    <form method="post" action="/lobby/create">
      <h3>Create Room</h3>
      <label>Max players (2-6)</label>
      <input name="max_players" value="6">
      <label>Private (true/false)</label>
      <input name="is_private" value="false">
      <button type="submit">Create</button>
    </form>

    <form method="post" action="/lobby/join">
      <h3>Join Room</h3>
      <label>Room ID</label>
      <input name="room_id">
      <label>Invite code</label>
      <input name="invite_code">
      <button type="submit">Join</button>
    </form>

    <form method="post" action="/lobby/leave">
      <h3>Leave Room</h3>
      <label>Room ID (optional)</label>
      <input name="room_id">
      <button type="submit">Leave</button>
    </form>

    <form method="post" action="/lobby/ready">
      <h3>Ready Toggle</h3>
      <label>Room ID (optional)</label>
      <input name="room_id">
      <label>Is ready (true/false, optional)</label>
      <input name="is_ready">
      <button type="submit">Set Ready</button>
    </form>
  </div>

  <p>Tip: Open <code>/lobby/rooms</code> in a new tab to see JSON output.</p>
</body>
</html>
