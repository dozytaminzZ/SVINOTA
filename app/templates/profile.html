{% extends "base.html" %}

{% block title %}Профиль - SVINOTA{% endblock %}

{% block content %}
<div class="page profile-page">
    <a class="back-link profile-back-link" href="/">
        <span class="back-arrow" aria-hidden="true"></span>
        Назад
    </a>

    <main class="profile-wrap">
        <section class="profile-panel" aria-label="Профиль игрока">
            <header class="profile-header">
                <span class="profile-title-line" aria-hidden="true"></span>
                <h1 class="profile-title">Профиль</h1>
                <span class="profile-title-line" aria-hidden="true"></span>
            </header>

            <input
                class="profile-photo-input"
                id="profile-avatar-input"
                type="file"
                name="avatar"
                accept=".png,.jpg,.jpeg,image/png,image/jpeg"
                aria-label="Загрузить фото профиля"
            >

            <button class="profile-photo-btn" id="profile-avatar-btn" type="button">
                <img class="profile-avatar-preview" id="profile-avatar-preview" alt="">
                <span class="profile-photo-icon" aria-hidden="true"></span>
                <span class="profile-photo-text">Загрузить<br>фото</span>
                <span class="profile-upload-icon" aria-hidden="true"></span>
            </button>

            <div class="profile-fields">
                <label class="profile-field">
                    <span class="field-icon field-icon-user" aria-hidden="true"></span>
                    <input type="text" name="name" value="{{ current_user.username }}" placeholder="Имя" aria-label="Имя">
                    <svg class="edit-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M14 4l6 6L9 21H3v-6L14 4z"></path>
                        <path d="M12 6l6 6"></path>
                    </svg>
                </label>

                <label class="profile-field">
                    <span class="field-icon field-icon-user" aria-hidden="true"></span>
                    <input type="text" name="login" value="{{ current_user.username }}" placeholder="Логин" aria-label="Логин">
                </label>

                <label class="profile-field">
                    <span class="field-icon field-icon-calendar" aria-hidden="true"></span>
                    <input type="text" name="registered_at" placeholder="Дата регистрации" aria-label="Дата регистрации" readonly>
                </label>

                <a class="game-btn profile-logout-btn" href="{{ url_for('auth.logout') }}">
                    <svg class="logout-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <path d="M16 17l5-5-5-5"></path>
                        <path d="M21 12H9"></path>
                    </svg>
                    Выйти
                </a>
            </div>
        </section>
    </main>
</div>

<script>
    const avatarInput = document.getElementById('profile-avatar-input');
    const avatarButton = document.getElementById('profile-avatar-btn');
    const avatarPreview = document.getElementById('profile-avatar-preview');

    avatarButton.addEventListener('click', () => {
        avatarInput.click();
    });

    avatarInput.addEventListener('change', () => {
        const [file] = avatarInput.files;

        if (!file || !['image/png', 'image/jpeg'].includes(file.type)) {
            avatarInput.value = '';
            return;
        }

        avatarPreview.src = URL.createObjectURL(file);
        avatarButton.classList.add('has-avatar');
    });
</script>
{% endblock %}
