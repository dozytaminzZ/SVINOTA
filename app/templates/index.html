{% extends "base.html" %}

{% block title %}Главная - SVINOTA{% endblock %}

{% block content %}
<div class="page index-page">

    <button class="info-btn" type="button" aria-label="Открыть опции">i</button>

    {% if current_user.is_authenticated %}
        <a class="profile-top-btn" href="/profile" aria-label="Профиль">
            <span class="profile-icon" aria-hidden="true"></span>
        </a>
    {% else %}
        <a class="auth-top-btn" href="/auth/">Авторизация</a>
    {% endif %}

    <main class="index-content">
        <div class="logo-composition">
            <div class="arc-logo arc-logo-main">
                <svg viewBox="0 0 420 250" xmlns="http://www.w3.org/2000/svg" aria-label="SVINOTA ONLINE">
                    <defs>
                        <path id="mainArcPath" d="M 35 205 A 175 175 0 0 1 385 205" />
                    </defs>

                    <text>
                        <textPath href="#mainArcPath" startOffset="50%" text-anchor="middle">
                            SVINOTA ONLINE
                        </textPath>
                    </text>
                </svg>
            </div>

            <img
                class="main-avatar"
                src="{{ url_for('static', filename='img/logo.png') }}"
                alt="Аватар SVINOTA"
            >
        </div>

        <div class="main-actions">
            <a class="game-btn" href="#">
                Создать игру
            </a>

            <a class="game-btn" href="#">
                Присоединиться
            </a>
        </div>
    </main>

    <div class="options-overlay" id="options-overlay" hidden>
        <section class="options-modal" role="dialog" aria-modal="true" aria-labelledby="options-title">
            <h2 class="options-title" id="options-title">Опции</h2>

            <button class="options-close" type="button" aria-label="Закрыть опции"></button>

            <div class="options-actions">
                <button class="options-btn" type="button" data-sound-toggle>Выключить звук</button>
                <button class="options-btn" type="button">Как играть</button>
                <button class="options-btn" type="button">О картах</button>
            </div>
        </section>
    </div>

</div>
{% endblock %}
