<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auth Dev Form</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    form { border: 1px solid #ccc; padding: 12px; border-radius: 6px; }
    label { display: block; font-size: 12px; margin-top: 8px; }
    input { width: 100%; padding: 6px; margin-top: 4px; }
    button { margin-top: 10px; }
    code { background: #f5f5f5; padding: 2px 4px; }
  </style>
</head>
<body>
  <h1>Auth Dev Form</h1>
  <p>Use these forms to test auth endpoints without JSON.</p>
  <p>Profile is a GET and uses your session cookie.</p>

  <div class="grid">
    <form method="post" action="/auth/register">
      <h3>Register</h3>
      <label>Username</label>
      <input name="username" required>
      <label>Password</label>
      <input name="password" type="password" required>
      <label>Email (optional)</label>
      <input name="email" type="email">
      <button type="submit">Register</button>
    </form>

    <form method="post" action="/auth/login">
      <h3>Login</h3>
      <label>Username</label>
      <input name="username">
      <label>Email (optional)</label>
      <input name="email" type="email">
      <label>Password</label>
      <input name="password" type="password" required>
      <button type="submit">Login</button>
    </form>

    <form method="post" action="/auth/guest">
      <h3>Guest</h3>
      <label>Base username (optional)</label>
      <input name="username" placeholder="guest">
      <button type="submit">Guest Login</button>
    </form>

    <form method="post" action="/auth/logout">
      <h3>Logout</h3>
      <button type="submit">Logout</button>
    </form>

    <form method="get" action="/auth/profile">
      <h3>Profile</h3>
      <button type="submit">Open Profile</button>
    </form>
  </div>

  <p>Tip: Open <code>/auth/profile</code> in a new tab to see JSON output.</p>
</body>
</html>
